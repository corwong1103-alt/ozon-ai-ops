<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ozon AI Ops Demo</title>
    <style>
      :root {
        --bg: #f7f8fb;
        --surface: #ffffff;
        --surface-2: #f0f3f8;
        --text: #141821;
        --muted: #6f7888;
        --line: #dfe4ec;
        --blue: #4f6fdc;
        --blue-2: #eef2ff;
        --purple: #7667d9;
        --green: #14a66d;
        --amber: #c98912;
        --red: #d94b4b;
        --shadow: 0 18px 48px rgba(25, 33, 61, 0.08);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .hidden {
        display: none !important;
      }

      .auth-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 420px;
      }

      .auth-hero {
        padding: 64px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background:
          radial-gradient(circle at 75% 16%, rgba(79, 111, 220, 0.16), transparent 32%),
          linear-gradient(180deg, #ffffff, #f3f5fa);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 800;
      }

      .brand-mark {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: var(--text);
        color: white;
        letter-spacing: -0.03em;
      }

      .hero-title {
        max-width: 760px;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--blue);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        letter-spacing: -0.03em;
      }

      h1 {
        font-size: clamp(48px, 6vw, 82px);
        line-height: 0.98;
      }

      .hero-title p,
      .muted {
        color: var(--muted);
        line-height: 1.75;
      }

      .hero-title p {
        max-width: 620px;
        font-size: 18px;
      }

      .hero-points {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        max-width: 900px;
      }

      .hero-points span,
      .chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        padding: 9px 12px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .auth-panel {
        display: grid;
        align-content: center;
        gap: 18px;
        padding: 30px;
        background: var(--surface);
        border-left: 1px solid var(--line);
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .auth-card {
        padding: 28px;
      }

      .field,
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        padding: 12px 13px;
        outline: none;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .field:focus,
      textarea:focus,
      select:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 4px rgba(79, 111, 220, 0.12);
      }

      label {
        display: block;
        margin-top: 14px;
      }

      label span {
        display: block;
        margin-bottom: 7px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid var(--blue);
        border-radius: 8px;
        background: var(--blue);
        color: white;
        padding: 11px 14px;
        font-weight: 800;
        transition: 0.16s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 28px rgba(79, 111, 220, 0.2);
      }

      .btn.secondary {
        border-color: var(--line);
        background: white;
        color: var(--text);
      }

      .btn.ghost {
        border-color: transparent;
        background: transparent;
        color: var(--muted);
      }

      .btn.danger {
        border-color: var(--red);
        background: var(--red);
      }

      .btn.full {
        width: 100%;
      }

      .quick-login {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .status-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .status-card {
        width: min(560px, 100%);
        padding: 34px;
        text-align: center;
      }

      .status-icon {
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        margin: 0 auto 18px;
        border-radius: 999px;
        background: var(--blue-2);
        color: var(--blue);
        font-weight: 900;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 252px 1fr;
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 22px;
        border-right: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(18px);
      }

      .nav {
        display: grid;
        gap: 6px;
        margin-top: 28px;
      }

      .nav button {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: var(--muted);
        padding: 11px 12px;
        text-align: left;
        font-weight: 750;
      }

      .nav button.active,
      .nav button:hover {
        background: var(--blue-2);
        color: var(--blue);
      }

      .sidebar-foot {
        position: absolute;
        left: 22px;
        right: 22px;
        bottom: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: var(--surface-2);
      }

      .main {
        min-width: 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(247, 248, 251, 0.88);
        padding: 24px 32px;
        backdrop-filter: blur(18px);
      }

      .topbar h2 {
        margin-top: 5px;
        font-size: clamp(28px, 4vw, 42px);
      }

      .content {
        padding: 28px 32px 52px;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .metrics {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .metric {
        padding: 18px;
      }

      .metric strong {
        display: block;
        margin-top: 8px;
        font-size: 32px;
        letter-spacing: -0.04em;
      }

      .two-col {
        grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.75fr);
      }

      .panel {
        padding: 20px;
      }

      .panel h3 {
        margin-bottom: 14px;
        font-size: 24px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 5px 9px;
        background: var(--surface-2);
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .badge.approved,
      .badge.success {
        background: rgba(20, 166, 109, 0.1);
        color: var(--green);
      }

      .badge.pending,
      .badge.queued {
        background: rgba(201, 137, 18, 0.12);
        color: var(--amber);
      }

      .badge.expired,
      .badge.suspended,
      .badge.failed {
        background: rgba(217, 75, 75, 0.1);
        color: var(--red);
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1.2fr 0.7fr 0.7fr 0.75fr 0.8fr auto;
        gap: 10px;
        align-items: end;
      }

      .table {
        overflow: hidden;
      }

      .row {
        display: grid;
        grid-template-columns: 1.4fr 1fr 1fr 0.9fr 1.1fr;
        gap: 12px;
        align-items: center;
        border-top: 1px solid var(--line);
        padding: 14px 16px;
      }

      .row.header {
        border-top: 0;
        background: var(--surface-2);
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .products {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .product-card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
      }

      .product-visual {
        height: 150px;
        background:
          radial-gradient(circle at 66% 32%, rgba(79, 111, 220, 0.22), transparent 24%),
          linear-gradient(135deg, #eef2ff, #f8fafc);
        border-bottom: 1px solid var(--line);
      }

      .product-body {
        padding: 14px;
      }

      .product-body h4 {
        min-height: 48px;
        margin: 8px 0;
        font-size: 16px;
        line-height: 1.35;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
      }

      .notice {
        border: 1px solid #cdd8ff;
        border-radius: 8px;
        background: var(--blue-2);
        color: #334486;
        padding: 12px 13px;
        line-height: 1.65;
      }

      .toast {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 20;
        max-width: 420px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--text);
        color: white;
        box-shadow: var(--shadow);
        padding: 13px 15px;
        line-height: 1.55;
      }

      .credit-list {
        display: grid;
        gap: 10px;
      }

      .credit-line {
        display: grid;
        grid-template-columns: 150px 1fr 72px;
        gap: 12px;
        align-items: center;
      }

      .bar {
        height: 9px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--surface-2);
      }

      .bar i {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--blue), var(--purple));
      }

      .admin-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 16px;
      }

      .mini-list {
        display: grid;
        gap: 10px;
      }

      .mini-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 13px;
      }

      @media (max-width: 1100px) {
        .auth-shell,
        .app,
        .two-col,
        .admin-layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: relative;
          height: auto;
        }

        .sidebar-foot {
          position: static;
          margin-top: 20px;
        }

        .metrics,
        .products {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .toolbar {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 700px) {
        .auth-hero,
        .auth-panel,
        .content,
        .topbar {
          padding: 22px;
        }

        .hero-points,
        .metrics,
        .products,
        .form-grid,
        .toolbar,
        .row,
        .credit-line {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

          { id: "log_1", adminId: "u_admin", targetUserId: "u_pro", actionType: "approve", message: "开通 pro@demo.com", createdAt: new Date().toLocaleString() }
        ],
        filteredOzon: [],
        filtered1688: []
      };

      state.filteredOzon = [...state.researchOzon];
      state.filtered1688 = [...state.research1688];

      const pages = [
        ["dashboard", "Dashboard", "控制台"],
        ["stores", "Ozon 店铺", "店铺绑定"],
        ["ozonResearch", "Ozon 调研", "选品调研"],
        ["collect1688", "1688 采集", "商品采集"],
        ["products", "商品池", "商品编辑"],
        ["credits", "AI 额度", "额度中心"],
        ["social", "社媒发布", "社媒运营"],
        ["customer", "客服助手", "客服自动回复"],
        ["tasks", "任务记录", "任务日志"],
        ["admin", "管理后台", "管理员"]
      ];

      function currentUser() {
        return state.users.find((user) => user.id === state.currentUserId);
      }

      function currentCredits() {
        return state.credits[state.currentUserId];
      }

      function userStores(userId = state.currentUserId) {
        return state.stores.filter((store) => store.userId === userId);
      }

      function userProducts() {
        return state.products.filter((product) => product.userId === state.currentUserId);
      }

      function userTasks(userId = state.currentUserId) {
        return state.tasks.filter((task) => task.userId === userId);
      }

      function userSocialAccounts(userId = state.currentUserId) {
        return state.socialAccounts.filter((account) => account.userId === userId);
      }

      function userCustomerMessages(userId = state.currentUserId) {
        return state.customerMessages.filter((message) => message.userId === userId);
      }

      function showLogin() {
        document.getElementById("loginForm").classList.remove("hidden");
        document.getElementById("registerForm").classList.add("hidden");
      }

      function showRegister() {
        document.getElementById("loginForm").classList.add("hidden");
        document.getElementById("registerForm").classList.remove("hidden");
      }

      document.getElementById("loginForm").addEventListener("submit", (event) => {
        event.preventDefault();
        login(document.getElementById("loginEmail").value.trim());
      });

      document.getElementById("registerForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const email = document.getElementById("registerEmail").value.trim() || `new_${Date.now()}@demo.com`;
        const user = { id: `u_${Date.now()}`, email, role: "user", status: "pending", plan: "starter", expiresAt: "", createdAt: new Date().toISOString().slice(0, 10) };
        state.users.push(user);
        state.credits[user.id] = { imageCredits: 0, videoCredits: 0, used: { image: 0, video: 0 }, monthlyResetAt: "" };
        state.currentUserId = user.id;
        routeAfterLogin();
      });

      function quickLogin(email) {
        document.getElementById("loginEmail").value = email;
        login(email);
      }

      function login(email) {
        const user = state.users.find((item) => item.email === email);
        if (!user) {
          notify("账号不存在。你可以先注册，注册后默认进入 pending 审核状态。");
          return;
        }
        state.currentUserId = user.id;
        routeAfterLogin();
      }

      function routeAfterLogin() {
        const user = currentUser();
        document.getElementById("authScreen").classList.add("hidden");
        document.getElementById("appScreen").classList.add("hidden");
        document.getElementById("statusScreen").classList.add("hidden");

        if (user.status !== "approved") {
          renderStatus(user.status);
          return;
        }
        state.page = user.role === "admin" ? "admin" : "dashboard";
        document.getElementById("appScreen").classList.remove("hidden");
        render();
      }

      function renderStatus(status) {
        const copy = {
          pending: ["账号审核中", "请联系管理员完成开通。审核通过后才能进入 Ozon AI Ops 后台。"],
          suspended: ["账号已停用", "请联系管理员处理账号状态。"],
          expired: ["账号已过期", "请联系管理员续期后继续使用平台。"]
        }[status] || ["账号不可用", "请联系管理员。"];
        document.getElementById("statusScreen").innerHTML = `
          <div class="card status-card">
            <div class="status-icon">!</div>
            <p class="eyebrow">${status}</p>
            <h2>${copy[0]}</h2>
            <p class="muted">${copy[1]}</p>
            <div class="actions" style="justify-content:center;margin-top:22px">
              <button class="btn" onclick="contactAdmin()">联系管理员</button>
              <button class="btn secondary" onclick="logout()">返回登录</button>
            </div>
          </div>`;
        document.getElementById("statusScreen").classList.remove("hidden");
      }

      function logout() {
        state.currentUserId = null;
        document.getElementById("authScreen").classList.remove("hidden");
        document.getElementById("appScreen").classList.add("hidden");
        document.getElementById("statusScreen").classList.add("hidden");
      }

      function navTo(page) {
        state.page = page;
        render();
      }

      function badge(text, cls = "") {
        return `<span class="badge ${cls || text}">${text}</span>`;
      }

      function notify(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.remove("hidden");
        clearTimeout(window.__toastTimer);
        window.__toastTimer = setTimeout(() => toast.classList.add("hidden"), 2800);
      }

      function addTask(type, status, creditCost, message) {
        state.tasks.unshift({ id: `task_${Date.now()}`, userId: state.currentUserId, type, status, creditCost, message, createdAt: new Date().toLocaleString() });
      }

      function contactAdmin() {
        notify("请联系管理员开通账号、续期或充值 AI 额度。");
      }

      function requireApproved() {
        const user = currentUser();
        if (!user || user.status !== "approved") {
          notify("账号未开通，无法使用该功能。");
          return false;
        }
        return true;
      }

      function consumeCredit(kind, taskType, failMessage, successMessage) {
        if (!requireApproved()) return false;
        const credits = currentCredits();
        const key = `${kind}Credits`;
        if (credits[key] <= 0) {
          addTask(taskType, "failed", 0, failMessage);
          notify(failMessage);
          render();
          return false;
        }
        credits[key] -= 1;
        credits.used[kind] += 1;
        addTask(taskType, "success", 1, successMessage);
        return true;
      }

      function renderShell() {
        const user = currentUser();
        const meta = pages.find(([id]) => id === state.page) || pages[0];
        document.getElementById("pageEyebrow").textContent = meta[1];
        document.getElementById("pageTitle").textContent = meta[2];
        document.getElementById("sideEmail").textContent = user.email;
        document.getElementById("sideMeta").innerHTML = `${badge(user.status, user.status)} ${badge(user.plan)} ${user.role === "admin" ? badge("admin") : ""}`;
        document.getElementById("nav").innerHTML = pages
          .filter(([id]) => user.role === "admin" || id !== "admin")
          .map(([id, label]) => `<button class="${state.page === id ? "active" : ""}" onclick="navTo('${id}')"><span>${label}</span><span>›</span></button>`)
          .join("");
      }

      function renderDashboard() {
        const user = currentUser();
        const credits = currentCredits();
        const recent = userTasks().slice(0, 5);
        return `
          <div class="grid metrics">
            <div class="card metric"><p class="eyebrow">Status</p><strong>${badge(user.status, user.status)}</strong><p class="muted">账号状态</p></div>
            <div class="card metric"><p class="eyebrow">Plan</p><strong>${user.plan}</strong><p class="muted">到期：${user.expiresAt || "待设置"}</p></div>
            <div class="card metric"><p class="eyebrow">Stores</p><strong>${userStores().length}</strong><p class="muted">已绑定 Ozon 店铺</p></div>
            <div class="card metric"><p class="eyebrow">Tasks</p><strong>${userTasks().length}</strong><p class="muted">最近任务总数</p></div>
          </div>
          <div class="grid metrics" style="margin-top:16px">
            ${creditMetric("AI商品图", credits.imageCredits)}
            ${creditMetric("AI视频", credits.videoCredits)}
            <div class="card metric"><p class="eyebrow">基础翻译功能</p><strong>已开通</strong><p class="muted">不消耗 AI 额度</p></div>
            <div class="card metric"><p class="eyebrow">上传/采集</p><strong>基础</strong><p class="muted">不扣额度</p></div>
          </div>
          <div class="grid two-col" style="margin-top:16px">
            <section class="card panel">
              <h3>最近任务记录</h3>
              ${renderTaskRows(recent)}
            </section>
            <section class="card panel">
              <h3>平台规则</h3>
              <div class="notice">平台非公开注册。注册后默认 pending，管理员审核 approved 后才能进入后台。翻译是基础功能，不消耗 AI 额度；AI 商品图与 AI 视频会检查并扣减对应额度。</div>
              <div class="actions" style="margin-top:14px">
                <button class="btn" onclick="navTo('products')">进入商品池</button>
                <button class="btn secondary" onclick="navTo('credits')">查看 AI 额度</button>
              </div>
            </section>
          </div>`;
      }

      function creditMetric(label, value) {
        return `<div class="card metric"><p class="eyebrow">${label}</p><strong>${value}</strong><p class="muted">剩余额度</p></div>`;
      }

      function renderStores() {
        const stores = userStores();
        return `
          <div class="grid two-col">
            <form class="card panel" onsubmit="saveStore(event)">
              <h3>绑定 Ozon 跨境电商店铺</h3>
              <label><span>店铺名称</span><input class="field" name="name" required placeholder="Ozon Growth Store" /></label>
              <label><span>Ozon 跨境店铺 ID</span><input class="field" name="ozonStoreId" required placeholder="OZON-CB-00001" /></label>
              <label><span>Ozon API Key</span><input class="field" name="apiKey" required placeholder="ozon_live_key_xxx" /></label>
              <button class="btn" style="margin-top:16px">保存店铺</button>
            </form>
            <section class="card panel">
              <h3>上传规则</h3>
              <p class="muted">用户可以绑定一个或多个 Ozon 跨境店铺。至少绑定一个店铺后，才能使用上传到 Ozon 功能。</p>
            </section>
          </div>
          <div class="card table" style="margin-top:16px">
            <div class="row header"><span>店铺</span><span>Ozon Store ID</span><span>API Key</span><span>创建时间</span><span>状态</span></div>
            ${stores.map((store) => `
              <div class="row">
                <strong>${store.name}</strong>
                <span>${store.ozonStoreId}</span>
                <span>${store.apiKey.slice(0, 14)}...</span>
                <span>${store.createdAt}</span>
                <span>${badge("active", "success")}</span>
              </div>`).join("") || `<div class="row"><span>暂无店铺</span><span>-</span><span>-</span><span>-</span><span>${badge("required", "pending")}</span></div>`}
          </div>`;
      }

      function saveStore(event) {
        event.preventDefault();
        const data = new FormData(event.target);
        state.stores.unshift({
          id: `store_${Date.now()}`,
          userId: state.currentUserId,
          name: data.get("name"),
          ozonStoreId: data.get("ozonStoreId"),
          apiKey: data.get("apiKey"),
          createdAt: new Date().toISOString().slice(0, 10)
        });
        notify("Ozon 店铺已绑定。");
        event.target.reset();
        render();
      }

      function renderResearch(source) {
        const isOzon = source === "ozon";
        const list = isOzon ? state.filteredOzon : state.filtered1688;
        return `
          <form class="card panel toolbar" onsubmit="searchResearch(event, '${source}')">
            <label><span>关键词</span><input class="field" name="keyword" placeholder="${isOzon ? "термобутылка / led" : "保温杯 / 灯带"}" /></label>
            <label><span>最低价</span><input class="field" name="min" type="number" /></label>
            <label><span>最高价</span><input class="field" name="max" type="number" /></label>
            <label><span>排序</span><select name="sort"><option value="sales">销量排序</option><option value="price">价格升序</option></select></label>
            <label><span>榜单</span><select name="hot"><option value="">全部</option><option value="hot-week">热销周前20</option><option value="hot-month">热销月前20</option></select></label>
            <button class="btn">搜索</button>
          </form>
          <div class="grid products" style="margin-top:16px">
            ${list.map((item) => productCard(item, true)).join("")}
          </div>`;
      }

      function searchResearch(event, source) {
        event.preventDefault();
        const data = new FormData(event.target);
        const keyword = String(data.get("keyword") || "").toLowerCase();
        const min = Number(data.get("min") || 0);
        const max = Number(data.get("max") || 999999);
        const hot = String(data.get("hot") || "");
        const base = source === "ozon" ? state.researchOzon : state.research1688;
        let result = base.filter((item) => {
          const text = `${item.title} ${item.description} ${item.tags.join(" ")}`.toLowerCase();
          return (!keyword || text.includes(keyword)) && item.price >= min && item.price <= max && (!hot || item.tags.includes(hot));
        });
        result.sort(data.get("sort") === "price" ? (a, b) => a.price - b.price : (a, b) => b.sales - a.sales);
        if (source === "ozon") state.filteredOzon = result;
        else state.filtered1688 = result;
        addTask(source === "ozon" ? "research" : "collect", "success", 0, `${source.toUpperCase()} 调研返回 ${result.length} 个商品。`);
        render();
      }

      function productCard(item, canAdd) {
        return `
          <article class="product-card">
            <div class="product-visual"></div>
            <div class="product-body">
              <span class="badge">${item.source}</span>
              <h4>${item.title}</h4>
              <p class="muted" style="font-size:13px;min-height:46px">${item.description}</p>
              <div style="display:flex;justify-content:space-between;align-items:end">
                <strong>${item.source === "1688" ? "¥" : "₽"}${item.price}</strong>
                <span class="muted">${item.sales?.toLocaleString?.() || 0} sold</span>
              </div>
              ${canAdd ? `<button class="btn full" style="margin-top:12px" onclick="addToPool('${item.id}', '${item.source}')">加入商品池</button>` : ""}
            </div>
          </article>`;
      }

      function addToPool(id, source) {
        const base = source === "ozon" ? state.researchOzon : state.research1688;
        const item = base.find((product) => product.id === id);
        const product = {
          id: `prod_${Date.now()}`,
          userId: state.currentUserId,
          storeId: userStores()[0]?.id || "",
          source,
          title: item.title,
          description: item.description,
          price: item.price,
          images: item.images,
          status: "draft",
          createdAt: new Date().toISOString().slice(0, 10)
        };
        state.products.unshift(product);
        state.selectedProductId = product.id;
        addTask("collect", "success", 0, `${source} 商品已加入商品池：${item.title}`);
        notify("已加入商品池。");
        navTo("products");
      }

      function renderProducts() {
        const products = userProducts();
        const active = products.find((item) => item.id === state.selectedProductId) || products[0];
        if (!active) {
          return `<div class="card panel"><h3>商品池为空</h3><p class="muted">请先从 Ozon 调研或 1688 采集加入商品。</p></div>`;
        }
        return `
          <div class="grid two-col">
            <section class="card panel">
              <h3>商品池</h3>
              <div class="grid">
                ${products.map((item) => `
                  <button class="store-option btn secondary" style="justify-content:space-between" onclick="state.selectedProductId='${item.id}'; render()">
                    <span>${item.title}</span><span>${badge(item.status)}</span>
                  </button>`).join("")}
              </div>
            </section>
            <form class="card panel" onsubmit="saveProduct(event, '${active.id}')">
              <h3>商品编辑</h3>
              <label><span>商品标题</span><input class="field" name="title" value="${escapeAttr(active.title)}" required /></label>
              <label><span>商品描述</span><textarea name="description" required>${active.description}</textarea></label>
              <label><span>商品价格</span><input class="field" name="price" type="number" step="0.01" value="${active.price}" required /></label>
              <label><span>商品图片</span><input class="field" name="images" value="${active.images.join(", ")}" required /></label>
              <div class="actions" style="margin-top:16px">
                <button class="btn">保存</button>
                <button class="btn secondary" type="button" onclick="aiTranslate('${active.id}')">基础俄文翻译</button>
                <button class="btn secondary" type="button" onclick="aiImage('${active.id}')">AI商品图生成</button>
                <button class="btn secondary" type="button" onclick="aiVideo('${active.id}')">AI视频生成</button>
                <button class="btn secondary" type="button" onclick="imageTextTranslate('${active.id}')">图片文字翻译俄文</button>
                <button class="btn" type="button" onclick="uploadOzon('${active.id}')">上传到 Ozon</button>
                <button class="btn secondary" type="button" onclick="prepareSocial('${active.id}')">生成社媒内容</button>
              </div>
            </form>
          </div>`;
      }

      function escapeAttr(value) {
        return String(value).replaceAll("&", "&amp;").replaceAll('"', "&quot;");
      }

      function saveProduct(event, id) {
        event.preventDefault();
        const product = state.products.find((item) => item.id === id);
        const data = new FormData(event.target);
        product.title = data.get("title");
        product.description = data.get("description");
        product.price = Number(data.get("price"));
        product.images = String(data.get("images")).split(",").map((item) => item.trim()).filter(Boolean);
        notify("商品信息已保存。");
        render();
      }

      function aiTranslate(id) {
        const product = state.products.find((item) => item.id === id);
        if (!requireApproved()) return;
        product.title = `[RU] ${product.title.replace("[RU] ", "")}`;
        product.description = `[RU] ${product.description.replace("[RU] ", "")}`;
        product.status = "translated";
        addTask("translate", "success", 0, `基础翻译完成：${product.title}`);
        notify("基础翻译功能已执行，不消耗 AI 额度。");
        render();
      }

      function imageTextTranslate(id) {
        const product = state.products.find((item) => item.id === id);
        if (!requireApproved()) return;
        product.status = "translated";
        addTask("translate", "success", 0, `图片文字翻译成俄文：${product.title}`);
        notify("图片中文字翻译已创建，基础功能不消耗 AI 额度。");
        render();
      }

      function aiImage(id) {
        const product = state.products.find((item) => item.id === id);
        if (!consumeCredit("image", "image", "AI商品图额度不足，请联系管理员充值", `AI 商品图生成完成：${product.title}`)) return;
        product.status = "image_generated";
        product.images.push("ai-generated-product-image");
        notify("AI 商品图生成成功，已扣减商品图额度 1。");
        render();
      }

      function aiVideo(id) {
        const product = state.products.find((item) => item.id === id);
        if (!consumeCredit("video", "video", "AI视频额度不足，请联系管理员充值", `AI 视频生成完成：${product.title}`)) return;
        product.status = "video_generated";
        notify("AI 视频生成成功，已扣减视频额度 1。");
        render();
      }

      function uploadOzon(id) {
        const product = state.products.find((item) => item.id === id);
        if (!requireApproved()) return;
        if (!userStores().length) {
          addTask("upload", "failed", 0, "未绑定 Ozon 店铺，上传失败。");
          notify("请先绑定至少一个 Ozon 跨境店铺。");
          render();
          return;
        }
        if (!product.title || !product.description || !product.price || !product.images.length) {
          addTask("upload", "failed", 0, "商品信息不完整，上传失败。");
          notify("商品信息不完整，无法上传到 Ozon。");
          render();
          return;
        }
        product.storeId = userStores()[0].id;
        product.status = "uploaded";
        addTask("upload", "queued", 0, `上传任务已创建：${product.title} -> ${userStores()[0].name}`);
        notify("上传到 Ozon 的模拟任务已创建。");
        render();
      }

      function prepareSocial(id) {
        state.selectedProductId = id;
        navTo("social");
      }

      function renderCredits() {
        const user = currentUser();
        const credits = currentCredits();
        const quota = planQuotas[user.plan];
        const rows = [
          ["AI商品图", "image", "imageCredits"],
          ["AI视频", "video", "videoCredits"]
        ];
        return `
          <div class="grid two-col">
            <section class="card panel">
              <h3>当前会员等级：${user.plan}</h3>
              <div class="notice" style="margin-bottom:16px">翻译、上传、客服回复、社媒图文发布为基础功能，不消耗 AI额度。AI商品图和AI视频会消耗额度。</div>
              <div class="credit-list">
                ${rows.map(([label, kind, key]) => {
                  const total = quota[key] || credits[key] + credits.used[kind] || 1;
                  const percent = Math.max(4, Math.min(100, (credits[key] / total) * 100));
                  return `<div class="credit-line"><strong>${label}</strong><div class="bar"><i style="width:${percent}%"></i></div><span>${credits[key]}</span></div>`;
                }).join("")}
              </div>
              <button class="btn" style="margin-top:18px" onclick="contactAdmin()">联系管理员充值额度</button>
            </section>
            <section class="card panel">
              <h3>本月已使用</h3>
              <div class="grid metrics" style="grid-template-columns:repeat(2,1fr)">
                <div class="metric card"><p class="eyebrow">Image</p><strong>${credits.used.image}</strong></div>
                <div class="metric card"><p class="eyebrow">Video</p><strong>${credits.used.video}</strong></div>
              </div>
            </section>
          </div>
          <section class="card panel" style="margin-top:16px">
            <h3>额度消耗记录</h3>
            ${renderTaskRows(userTasks().filter((task) => task.creditCost > 0))}
          </section>`;
      }

      function renderTasks() {
        return `<section class="card panel"><h3>任务记录</h3>${renderTaskRows(userTasks())}</section>`;
      }

      function renderSocial() {
        const products = userProducts();
        const product = products.find((item) => item.id === state.selectedProductId) || products[0];
        const accounts = userSocialAccounts();
        if (!product) {
          return `<div class="card panel"><h3>社媒发布</h3><p class="muted">商品池为空，请先添加商品后生成社媒内容。</p></div>`;
        }
        return `
          <div class="grid two-col">
            <section class="card panel">
              <h3>授权社媒账号</h3>
              <div class="mini-list">
                ${accounts.map((account) => `
                  <div class="mini-item">
                    <div style="display:flex;justify-content:space-between;gap:12px;align-items:center">
                      <strong>${account.platform.toUpperCase()}</strong>
                      ${badge(account.status, account.status === "connected" ? "success" : "pending")}
                    </div>
                    <p class="muted">${account.accountName}</p>
                    <button class="btn secondary" onclick="toggleSocial('${account.id}')">${account.status === "connected" ? "断开授权" : "模拟授权"}</button>
                  </div>`).join("")}
              </div>
            </section>
            <section class="card panel">
              <h3>生成社媒内容</h3>
              <label><span>选择商品</span><select onchange="state.selectedProductId=this.value; render()">${products.map((item) => `<option value="${item.id}" ${item.id === product.id ? "selected" : ""}>${item.title}</option>`).join("")}</select></label>
              <div class="notice" style="margin-top:14px">图文发布是基础功能，不扣额度。AI 视频生成后发布会扣减 videoCredits。</div>
              <div class="mini-item" style="margin-top:14px">
                <p class="eyebrow">Preview</p>
                <strong>${product.title}</strong>
                <p class="muted">${product.description}</p>
                <p>标题：Ozon 热卖精选｜${product.title}</p>
                <p>文案：适合跨境店铺上新，突出实用场景、价格优势和礼品属性。</p>
                <p>Hashtag：#ozon #crossborder #russiashop #homegoods</p>
              </div>
              <div class="actions" style="margin-top:14px">
                <button class="btn secondary" onclick="createSocialContent('${product.id}')">生成图文素材</button>
                <button class="btn secondary" onclick="publishSocialImage('${product.id}')">图文发布</button>
                <button class="btn" onclick="publishSocialVideo('${product.id}')">AI视频生成后发布</button>
              </div>
            </section>
          </div>
          <section class="card panel" style="margin-top:16px">
            <h3>发布记录</h3>
            <div class="card table" style="box-shadow:none">
              <div class="row header"><span>平台</span><span>商品</span><span>类型</span><span>状态</span><span>内容</span></div>
              ${state.socialPosts.filter((post) => post.userId === state.currentUserId).map((post) => {
                const item = state.products.find((p) => p.id === post.productId);
                return `<div class="row"><strong>${post.platform}</strong><span>${item?.title || "-"}</span><span>${post.mediaType}</span><span>${badge(post.status, post.status === "published" ? "success" : "queued")}</span><span class="muted">${post.content}</span></div>`;
              }).join("")}
            </div>
          </section>`;
      }

      function toggleSocial(id) {
        const account = state.socialAccounts.find((item) => item.id === id);
        account.status = account.status === "connected" ? "disconnected" : "connected";
        account.accountName = account.status === "connected" ? `@demo_${account.platform}` : "-";
        addTask("social", "success", 0, `${account.platform} 社媒账号${account.status === "connected" ? "授权" : "断开"}完成。`);
        render();
      }

      function createSocialContent(productId) {
        const product = state.products.find((item) => item.id === productId);
        addTask("social_post", "success", 0, `已根据商品描述生成社媒标题、文案、Hashtag、图片素材：${product.title}`);
        notify("社媒图文素材已生成，不消耗 AI 额度。");
        render();
      }

      function publishSocialImage(productId) {
        const product = state.products.find((item) => item.id === productId);
        const account = userSocialAccounts().find((item) => item.status === "connected");
        if (!account) {
          addTask("social_publish", "failed", 0, "未授权社媒账号，图文发布失败。");
          notify("请先授权至少一个社媒账号。");
          render();
          return;
        }
        state.socialPosts.unshift({ id: `post_${Date.now()}`, userId: state.currentUserId, productId, platform: account.platform, content: `图文发布：${product.title} #ozon #crossborder`, mediaType: "image", status: "published", createdAt: new Date().toLocaleString() });
        addTask("social_publish", "success", 0, `社媒图文已发布到 ${account.platform}：${product.title}`);
        notify("社媒图文发布成功，不消耗 AI 额度。");
        render();
      }

      function publishSocialVideo(productId) {
        const product = state.products.find((item) => item.id === productId);
        const account = userSocialAccounts().find((item) => item.status === "connected");
        if (!account) {
          addTask("social_video", "failed", 0, "未授权社媒账号，AI 视频发布失败。");
          notify("请先授权至少一个社媒账号。");
          render();
          return;
        }
        if (!consumeCredit("video", "social_video", "AI视频额度不足，请联系管理员充值", `社媒 AI 视频生成完成：${product.title}`)) return;
        state.socialPosts.unshift({ id: `post_${Date.now()}`, userId: state.currentUserId, productId, platform: account.platform, content: `AI 视频发布：${product.title} #ozon #video`, mediaType: "video", status: "published", createdAt: new Date().toLocaleString() });
        addTask("social_publish", "success", 0, `AI 视频已发布到 ${account.platform}：${product.title}`);
        notify("AI 视频生成并发布成功，已扣减视频额度 1。");
        render();
      }

      function renderCustomer() {
        const messages = userCustomerMessages();
        return `
          <div class="grid two-col">
            <section class="card panel">
              <h3>Ozon 客服消息</h3>
              <div class="mini-list">
                ${messages.map((msg) => `
                  <div class="mini-item">
                    <div style="display:flex;justify-content:space-between;gap:12px">
                      <strong>${msg.customerName}</strong>
                      ${badge(msg.category, msg.status === "important" || msg.status === "alert" ? "pending" : "")}
                    </div>
                    <p>${msg.message}</p>
                    <p class="muted">状态：${msg.status}</p>
                    <div class="actions">
                      <button class="btn secondary" onclick="generateReply('${msg.id}')">AI生成回复建议</button>
                      <button class="btn" onclick="sendReply('${msg.id}')">一键发送回复</button>
                      <button class="btn secondary" onclick="markAlert('${msg.id}')">重要提醒</button>
                    </div>
                  </div>`).join("")}
              </div>
            </section>
            <section class="card panel">
              <h3>回复建议</h3>
              <div class="notice">客服自动回复、提醒、消息分类属于基础运营功能，不消耗 AI 额度。</div>
              ${messages.map((msg) => `
                <div class="mini-item" style="margin-top:12px">
                  <p class="eyebrow">${msg.category}</p>
                  <strong>${msg.customerName}</strong>
                  <p class="muted">${msg.suggestedReply}</p>
                </div>`).join("")}
            </section>
          </div>`;
      }

      function generateReply(id) {
        const msg = state.customerMessages.find((item) => item.id === id);
        addTask("auto_reply", "success", 0, `已生成客服回复建议：${msg.customerName} / ${msg.category}`);
        notify("AI 客服回复建议已生成，不消耗 AI 额度。");
        render();
      }

      function sendReply(id) {
        const msg = state.customerMessages.find((item) => item.id === id);
        msg.status = "replied";
        addTask("customer_message", "success", 0, `已发送客服回复：${msg.customerName}`);
        notify("客服回复已发送。");
        render();
      }

      function markAlert(id) {
        const msg = state.customerMessages.find((item) => item.id === id);
        msg.status = "alert";
        addTask("alert", "queued", 0, `重要消息提醒：${msg.customerName} / ${msg.category}`);
        notify("已加入重要消息提醒。");
        render();
      }

      function renderTaskRows(tasks) {
        return `
          <div class="card table" style="box-shadow:none">
            <div class="row header"><span>任务类型</span><span>状态</span><span>消耗额度</span><span>时间</span><span>备注</span></div>
            ${tasks.map((task) => `
              <div class="row">
                <strong>${task.type}</strong>
                <span>${badge(task.status, task.status)}</span>
                <span>${task.creditCost}</span>
                <span>${task.createdAt}</span>
                <span class="muted">${task.message}</span>
              </div>`).join("") || `<div class="row"><span>暂无记录</span><span>-</span><span>-</span><span>-</span><span>-</span></div>`}
          </div>`;
      }

      function renderAdmin() {
        const selectedUser = state.users.find((user) => user.role === "user") || state.users[0];
        return `
          <div class="admin-layout">
            <section class="card table">
              <div class="row header"><span>用户</span><span>状态</span><span>等级</span><span>到期</span><span>操作</span></div>
              ${state.users.filter((user) => user.role !== "admin").map((user) => `
                <div class="row">
                  <strong>${user.email}</strong>
                  <span>${badge(user.status, user.status)}</span>
                  <span>${user.plan}</span>
                  <span>${user.expiresAt || "未设置"}</span>
                  <span class="actions">
                    <button class="btn secondary" onclick="adminApprove('${user.id}')">开通</button>
                    <button class="btn secondary" onclick="adminSuspend('${user.id}')">停用</button>
                  </span>
                </div>`).join("")}
            </section>
            <section class="card panel">
              <h3>管理操作</h3>
              <label><span>选择用户</span><select id="adminUser">${state.users.filter((user) => user.role !== "admin").map((user) => `<option value="${user.id}">${user.email}</option>`).join("")}</select></label>
              <label><span>会员等级</span><select id="adminPlan"><option value="starter">starter</option><option value="pro">pro</option><option value="vip">vip</option></select></label>
              <label><span>到期时间</span><input id="adminExpires" class="field" type="date" value="2026-12-31" /></label>
              <label><span>额度调整数量</span><input id="adminCreditAmount" class="field" type="number" value="100" /></label>
              <div class="actions" style="margin-top:16px">
                <button class="btn" onclick="adminSetPlan()">设置等级/到期</button>
                <button class="btn secondary" onclick="adminAddCredits()">增加额度</button>
                <button class="btn secondary" onclick="adminDeductCredits()">扣减额度</button>
              </div>
              <div class="notice" style="margin-top:16px">管理员可审核用户、开通/停用用户、设置会员等级和到期时间、调整 AI 额度，并查看用户店铺、社媒授权状态、客服提醒状态与使用记录。</div>
            </section>
          </div>
          <div class="grid two-col" style="margin-top:16px">
            <section class="card panel"><h3>AI 使用记录</h3>${renderTaskRows(state.tasks.slice(0, 8))}</section>
            <section class="card panel"><h3>绑定店铺概览</h3>${state.stores.map((store) => `<p><strong>${store.name}</strong><br><span class="muted">${store.ozonStoreId} / ${state.users.find((u) => u.id === store.userId)?.email}</span></p>`).join("")}</section>
            <section class="card panel"><h3>社媒授权状态</h3>${state.socialAccounts.map((account) => `<p><strong>${account.platform.toUpperCase()}</strong> ${badge(account.status, account.status === "connected" ? "success" : "pending")}<br><span class="muted">${account.accountName} / ${state.users.find((u) => u.id === account.userId)?.email}</span></p>`).join("")}</section>
            <section class="card panel"><h3>客服提醒状态</h3>${state.customerMessages.map((msg) => `<p><strong>${msg.category}</strong> ${badge(msg.status, msg.status === "replied" ? "success" : "pending")}<br><span class="muted">${msg.customerName} / ${msg.message}</span></p>`).join("")}</section>
          </div>`;
      }

      function selectedAdminUser() {
        return document.getElementById("adminUser")?.value;
      }

      function adminLog(targetUserId, actionType, message) {
        state.adminLogs.unshift({ id: `log_${Date.now()}`, adminId: state.currentUserId, targetUserId, actionType, message, createdAt: new Date().toLocaleString() });
      }

      function adminApprove(id) {
        const user = state.users.find((item) => item.id === id);
        user.status = "approved";
        adminLog(id, "approve", `开通用户 ${user.email}`);
        notify("用户已开通。");
        render();
      }

      function adminSuspend(id) {
        const user = state.users.find((item) => item.id === id);
        user.status = "suspended";
        adminLog(id, "suspend", `停用用户 ${user.email}`);
        notify("用户已停用。");
        render();
      }

      function adminSetPlan() {
        const id = selectedAdminUser();
        const user = state.users.find((item) => item.id === id);
        user.plan = document.getElementById("adminPlan").value;
        user.expiresAt = document.getElementById("adminExpires").value;
        adminLog(id, "set_plan", `设置 ${user.email} 为 ${user.plan}，到期 ${user.expiresAt}`);
        notify("会员等级和到期时间已更新。");
        render();
      }

      function adminAddCredits() {
        adjustCredits(1);
      }

      function adminDeductCredits() {
        adjustCredits(-1);
      }

      function adjustCredits(direction) {
        const id = selectedAdminUser();
        const amount = Number(document.getElementById("adminCreditAmount").value || 0) * direction;
        const credits = state.credits[id];
        credits.imageCredits = Math.max(0, credits.imageCredits + amount);
        credits.videoCredits = Math.max(0, credits.videoCredits + Math.round(amount / 10));
        adminLog(id, direction > 0 ? "add_credits" : "deduct_credits", `${direction > 0 ? "增加" : "扣减"} AI 额度`);
        notify("AI 额度已调整。");
        render();
      }

      function render() {
        renderShell();
        const views = {
          dashboard: renderDashboard,
          stores: renderStores,
          ozonResearch: () => renderResearch("ozon"),
          collect1688: () => renderResearch("1688"),
          products: renderProducts,
          credits: renderCredits,
          social: renderSocial,
          customer: renderCustomer,
          tasks: renderTasks,
          admin: renderAdmin
        };
        document.getElementById("content").innerHTML = views[state.page]();
      }
    </script>
  </body>
</html>
