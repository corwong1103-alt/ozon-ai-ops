services:
  app:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ozon_ai_ops
      POSTGRES_USER: ozon
    volumes:
      - ozon_postgres:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  ozon_postgres:
